<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valle de Maipo</title>
    <style>
        /* Remove default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .hero-container {
            /* Use dvh (dynamic viewport height) for better mobile support */
            height: 100vh; 
            height: 100dvh; 
            width: 100%;
            
            /* Background magic */
            background-image: url('valledemaipo.jpg'); /* Replace with your image link */
            background-size: cover;      /* Fills the screen */
            /* background-position: center; /* Centers the image */
            background-position: center 35%;
            background-repeat: no-repeat;
            
            /* Optional: Centers text over the image */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="hero-container"></div>

</body>
</html>
